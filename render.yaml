# Render Blueprint — deploys the AI Filters Shopify app backend.
# In Render: New → Blueprint → connect this repo. Render reads this file.
# Secrets (sync: false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: ai-filters
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SCOPES
        value: read_products,write_products
      # Set these in the Render dashboard (marked "sync: false" so they stay secret):
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
