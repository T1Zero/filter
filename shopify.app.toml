# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "de4b14ec67e34726e9af9d1f91a499e2"
application_url = "https://ai-filters.onrender.com"
embedded = true
name = "Filter"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read/write_products covers products, collections, and their metafields.
scopes = "read_products,write_products"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://ai-filters.onrender.com/auth/callback",
  "https://ai-filters.onrender.com/auth/shopify/callback",
  "https://ai-filters.onrender.com/api/auth/callback"
]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
